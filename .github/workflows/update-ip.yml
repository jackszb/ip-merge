name: 更新 IP 规则

on:
  schedule:
    # UTC 20:00，即北京时间次日 04:00，可按需修改
    - cron: '0 20 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 运行合并脚本
        run: python scripts/merge_ip.py

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rules/
          if git diff --cached --quiet; then
            echo "没有变化，跳过提交"
          else
            git commit -m "chore: 自动更新 IP 规则 $(date -u +'%Y-%m-%d')"
            git push
          fi
